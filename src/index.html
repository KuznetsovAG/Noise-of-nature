<!DOCTYPE html>
<html lang="en">
  <link>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
  </head>
  <body>
    <div class="page">
      <div class="page-title">Weather sounds</div>
      <div class="nature-type-block">
        <div class="nature-type" id="summer">
          <img src="./files/assets/summer-bg.jpg" alt="summer-bg" class="nature-image">
          <img src="./files/assets/icons/sun.svg" alt="sun" class="nature-icon" id="sunIcon">
        </div>
        <div class="nature-type" id="rainy">
          <img src="./files/assets/rainy-bg.jpg" alt="rainy-bg" class="nature-image">
          <img src="./files/assets/icons/cloud-rain.svg" alt="rain" class="nature-icon" id="rainIcon">
        </div>
        <div class="nature-type" id="winter">
          <img src="./files/assets/winter-bg.jpg" alt="winter-bg" class="nature-image">
          <img src="./files/assets/icons/cloud-snow.svg" alt="snow" class="nature-icon" id="snowIcon">
        </div>
      </div>
      <audio id="rainAudio" src="./files/assets/sounds/rain.mp3"></audio>
      <audio id="summerAudio" src="./files/assets/sounds/summer.mp3"></audio>
      <audio id="winterAudio" src="./files/assets/sounds/winter.mp3"></audio>
      <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="1">
    </div>
    <script src="./app.js"></script>
  </body>
</html>
